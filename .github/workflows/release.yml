name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Build extension
        run: npm run build

      - name: Find release artifact
        id: artifact
        run: |
          FILE=$(find release -type f -name "*.zip" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "No zip file found in release/"
            exit 1
          fi

          echo "file=$FILE" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n 1)

          if [ -n "$PREVIOUS_TAG" ]; then
            {
              echo "body<<EOF"
              echo "## Changes"
              echo
              git log --pretty=format:"- %s" "${PREVIOUS_TAG}..${GITHUB_REF_NAME}" | grep -vE '^- v?[0-9]+\.[0-9]+\.[0-9]+$'
              echo
              echo
              echo "**Full diff:** https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${GITHUB_REF_NAME}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "body<<EOF"
              echo "Initial release"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: ${{ steps.artifact.outputs.file }}